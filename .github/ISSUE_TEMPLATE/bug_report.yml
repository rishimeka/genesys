name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Storage backend
      options:
        - memory
        - postgres
        - obsidian
        - falkordb
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: genesys-memory version
      placeholder: "0.3.0"
    validations:
      required: true
