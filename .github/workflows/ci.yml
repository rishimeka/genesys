name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --ignore=tests/test_integration.py --ignore=tests/test_retrieval.py --cov=src/genesys --cov-report=term-missing --cov-report=xml
      - run: python -m ruff check src/
      - run: python -m mypy src/genesys --ignore-missing-imports
